version: '3'

# 定义公共配置（x-开头的扩展字段，可被复用）
x-common:
  # 定义别名，用于引用
  &common
  environment:
    - DISPLAY=${DISPLAY}
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=all
    - OMP_WAIT_POLICY=passive
    - TERM=xterm-256color
  volumes:
    - /tmp/.X11-unix:/tmp/.X11-unix
    - ./..:/openvla # 注意：原cpu服务是/pytorch/，这里统一为/pytorch（路径末尾斜杠不影响实际映射）
  entrypoint: [ '/bin/bash' ]
  stdin_open: true
  tty: true
  working_dir: "/openvla"

services:

  gpu-service:
    <<: *common # 引用公共配置
    image: elainasuki/other:openvla_mujoco
    container_name: openvla_mujoco-container
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
